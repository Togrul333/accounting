<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil — Hisar Tour</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0d0d0d; color: #ececec; }
    .card { background: #161616; border: 1px solid #242424; border-radius: 16px; }
    .input-field {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1px solid #2e2e2e; background: #1a1a1a;
      color: #ececec; font-size: 14px; outline: none; transition: all .2s;
    }
    .input-field::placeholder { color: #484848; }
    .input-field:focus { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary:hover { filter: brightness(1.08); box-shadow: 0 0 24px rgba(0,212,255,0.2); }
    .toast {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      padding: 11px 18px; border-radius: 12px;
      font-size: 13px; font-weight: 500; display: none;
    }
    .toast.show { display: flex; align-items: center; gap: 8px; }
    .toast.success { background: rgba(0,212,255,0.15); color: #00d4ff; border: 1px solid rgba(0,212,255,0.25); }
    .toast.error { background: #2a1a1a; color: #ff5555; border: 1px solid rgba(255,85,85,0.2); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  </style>
</head>
<body>

{{template "sidebar" .}}
{{template "topbar" .}}

<div class="toast" id="toast"></div>

<main class="ml-64 min-h-screen p-8">

  <div class="mb-8">
    <h1 class="text-2xl font-bold" style="color:#ececec;">Profil</h1>
    <p class="text-sm mt-1" style="color:#484848;">Hesap bilgileri</p>
  </div>

  <div class="max-w-2xl space-y-6">

    <!-- Avatar + isim -->
    <div class="card p-6 flex items-center gap-5">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0"
           style="background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.2);">
        <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
      </div>
      <div>
        <p class="text-lg font-bold" style="color:#ececec;">{{.user.Name}}</p>
        <p class="text-sm" style="color:#484848;">{{.user.Email}}</p>
      </div>
    </div>

    <!-- Bilgiler -->
    <div class="card p-6">
      <p class="text-sm font-semibold mb-5" style="color:#ececec;">Kullanıcı Bilgileri</p>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color:#686868;">Ad Soyad</label>
          <input type="text" id="profile-name" class="input-field"
                 value="{{.user.Name}}" placeholder="Ad Soyad">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color:#686868;">E-posta</label>
          <input type="email" id="profile-email" class="input-field"
                 value="{{.user.Email}}" placeholder="E-posta">
        </div>
      </div>
      <div class="mt-6">
        <button class="btn-primary" onclick="saveProfile()">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
          </svg>
          Kaydet
        </button>
      </div>
    </div>

    <!-- Şifre değiştir -->
    <div class="card p-6">
      <p class="text-sm font-semibold mb-5" style="color:#ececec;">Şifre Değiştir</p>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color:#686868;">Mevcut Şifre</label>
          <input type="password" id="pw-current" class="input-field" placeholder="••••••••">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color:#686868;">Yeni Şifre</label>
          <input type="password" id="pw-new" class="input-field" placeholder="••••••••">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color:#686868;">Yeni Şifre Tekrar</label>
          <input type="password" id="pw-confirm" class="input-field" placeholder="••••••••">
        </div>
      </div>
      <div class="mt-6">
        <button class="btn-primary" onclick="changePassword()">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
          Şifreyi Güncelle
        </button>
      </div>
    </div>

  </div>
</main>

<script>
function saveProfile() {
  var name  = document.getElementById('profile-name').value.trim();
  var email = document.getElementById('profile-email').value.trim();
  if (!name || !email) { showToast('Ad ve e-posta zorunlu', 'error'); return; }

  fetch('/api/profile', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: name, email: email})
  }).then(function(r) {
    if (r.ok) showToast('Profil güncellendi', 'success');
    else r.json().then(function(d) { showToast(d.error || 'Hata', 'error'); });
  }).catch(function() { showToast('Hata oluştu', 'error'); });
}

function changePassword() {
  var current = document.getElementById('pw-current').value;
  var nw      = document.getElementById('pw-new').value;
  var confirm = document.getElementById('pw-confirm').value;
  if (!current || !nw) { showToast('Tüm alanları doldurun', 'error'); return; }
  if (nw !== confirm)  { showToast('Şifreler eşleşmiyor', 'error'); return; }

  fetch('/api/profile/password', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({current: current, new: nw})
  }).then(function(r) {
    if (r.ok) {
      showToast('Şifre güncellendi', 'success');
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value = '';
      document.getElementById('pw-confirm').value = '';
    } else {
      r.json().then(function(d) { showToast(d.error || 'Hata', 'error'); });
    }
  }).catch(function() { showToast('Hata oluştu', 'error'); });
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(function() { t.className = 'toast'; }, 2500);
}
</script>
</body>
</html>
