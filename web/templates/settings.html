<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayarlar — Hisar Tour</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0d0d0d; color: #ececec; }
    .card { background: #161616; border: 1px solid #242424; border-radius: 16px; }
    .input-field {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1px solid #2e2e2e; background: #1a1a1a;
      color: #ececec; font-size: 14px; outline: none; transition: all .2s;
    }
    .input-field::placeholder { color: #484848; }
    .input-field:focus { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .btn-primary:hover { filter: brightness(1.08); box-shadow: 0 0 24px rgba(0,212,255,0.2); }
    .toast {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      padding: 11px 18px; border-radius: 12px;
      font-size: 13px; font-weight: 500; display: none;
    }
    .toast.show { display: flex; align-items: center; gap: 8px; }
    .toast.success { background: rgba(0,212,255,0.15); color: #00d4ff; border: 1px solid rgba(0,212,255,0.25); }
    .toast.error { background: #2a1a1a; color: #ff5555; border: 1px solid rgba(255,85,85,0.2); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  </style>
</head>
<body>

{{template "sidebar" .}}
{{template "topbar" .}}

<div class="toast" id="toast"></div>

<main class="ml-64 min-h-screen p-8">

  <div class="mb-8">
    <h1 class="text-2xl font-bold" style="color:#ececec;">Ayarlar</h1>
    <p class="text-sm mt-1" style="color:#484848;">Döviz kurları</p>
  </div>

  <div class="max-w-lg">
    <div class="card p-6">
      <p class="text-sm font-semibold mb-1" style="color:#ececec;">Döviz Kurları</p>
      <p class="text-xs mb-6" style="color:#484848;">1 birim yabancı para = kaç ₺ (Türk Lirası)</p>

      <div class="space-y-4" id="rates-form">

        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-sm font-bold"
               style="background:rgba(0,212,255,0.08); border:1px solid rgba(0,212,255,0.15); color:#00d4ff;">$</div>
          <div class="flex-1">
            <label class="block text-xs font-medium mb-1.5" style="color:#686868;">USD → TRY</label>
            <input type="number" step="0.01" min="0" id="rate-usd" class="input-field"
                   placeholder="0.00" value="{{printf "%.4f" .rates.USD}}">
          </div>
        </div>

        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-sm font-bold"
               style="background:rgba(123,47,255,0.08); border:1px solid rgba(123,47,255,0.15); color:#7b2fff;">€</div>
          <div class="flex-1">
            <label class="block text-xs font-medium mb-1.5" style="color:#686868;">EUR → TRY</label>
            <input type="number" step="0.01" min="0" id="rate-eur" class="input-field"
                   placeholder="0.00" value="{{printf "%.4f" .rates.EUR}}">
          </div>
        </div>

        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-sm font-bold"
               style="background:rgba(255,200,50,0.08); border:1px solid rgba(255,200,50,0.15); color:#ffc832;">£</div>
          <div class="flex-1">
            <label class="block text-xs font-medium mb-1.5" style="color:#686868;">GBP → TRY</label>
            <input type="number" step="0.01" min="0" id="rate-gbp" class="input-field"
                   placeholder="0.00" value="{{printf "%.4f" .rates.GBP}}">
          </div>
        </div>

      </div>

      <div class="mt-6">
        <button class="btn-primary" onclick="saveRates()">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
          </svg>
          Kaydet
        </button>
      </div>
    </div>
  </div>

</main>

<script>
function saveRates() {
  var usd = parseFloat(document.getElementById('rate-usd').value) || 0;
  var eur = parseFloat(document.getElementById('rate-eur').value) || 0;
  var gbp = parseFloat(document.getElementById('rate-gbp').value) || 0;

  fetch('/api/settings/rates', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({usd: usd, eur: eur, gbp: gbp})
  })
  .then(function(r) {
    if (r.ok) showToast('Kurlar kaydedildi', 'success');
    else showToast('Hata oluştu', 'error');
  })
  .catch(function() { showToast('Hata oluştu', 'error'); });
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(function() { t.className = 'toast'; }, 2500);
}
</script>
</body>
</html>
